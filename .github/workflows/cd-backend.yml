name: Backend CD (develop)

on:
  push:
    branches: [develop]
    paths:
      - "backend/**"
      - "infra/cloudbuild-backend.yaml"

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements-dev.txt', 'backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Test (pytest)
        run: pytest tests/ -v

  deploy:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Submit Cloud Build
        env:
          COMMIT_SHA: ${{ github.sha }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          gcloud builds submit \
            --config=infra/cloudbuild-backend.yaml \
            --substitutions=_COMMIT_SHA="$COMMIT_SHA" \
            --project="$GCP_PROJECT_ID"
        timeout-minutes: 15
