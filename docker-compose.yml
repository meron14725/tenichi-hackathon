services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://tenichi:tenichi@db:5432/tenichi
      - OTP2_GRAPHQL_URL=http://otp2:8080/otp/gtfs/v1
      - JWT_SECRET=${JWT_SECRET}
      - WEATHERAPI_KEY=${WEATHERAPI_KEY}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-schedule-t-y-k-app}
      - GCP_LOCATION=${GCP_LOCATION:-asia-northeast1}
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/keys/adc.json
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS:-~/.config/gcloud/application_default_credentials.json}:/tmp/keys/adc.json:ro
    depends_on:
      db:
        condition: service_healthy
      otp2:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tenichi
      POSTGRES_PASSWORD: tenichi
      POSTGRES_DB: tenichi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenichi -d tenichi"]
      interval: 5s
      timeout: 5s
      retries: 5

  otp2:
    build: ./otp2
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/otp/"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

volumes:
  postgres_data:
