steps:
  # Step 1: Docker イメージをビルド
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/app/fastapi-backend:$_COMMIT_SHA'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/app/fastapi-backend:latest'
      - './backend'

  # Step 2: Artifact Registry にプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/app/fastapi-backend'

  # Step 3: Cloud Run にデプロイ
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'fastapi-backend'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/app/fastapi-backend:$_COMMIT_SHA'
      - '--region=asia-northeast1'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--port=8000'
      - '--ingress=all'
      - '--allow-unauthenticated'
      - '--set-secrets=SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_KEY=SUPABASE_KEY:latest,JWT_SECRET=JWT_SECRET:latest,WEATHERAPI_KEY=WEATHERAPI_KEY:latest,OTP2_GRAPHQL_URL=OTP2_GRAPHQL_URL:latest,DATABASE_URL=DATABASE_URL:latest'
      - '--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,GCP_LOCATION=asia-northeast1,ENVIRONMENT=production'
      - '--service-account=fastapi-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--timeout=60'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/app/fastapi-backend:$_COMMIT_SHA'
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/app/fastapi-backend:latest'

timeout: '600s'

options:
  logging: CLOUD_LOGGING_ONLY
